name: CI for Python code

on:
  push:
    paths:
      - 'python/**'
      - '!python/LICENSE'
      - '!python/MANIFEST.in'
      - '!python/README.md'
  pull_request:
    paths:
      - 'python/**'
      - '!python/LICENSE'
      - '!python/MANIFEST.in'
      - '!python/README.md'
  workflow_dispatch: {}

jobs:
  build:
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        python-version:
          - '3.9'
          - '3.10'
          - '3.11'
        os:
          - windows-latest
          - ubuntu-latest
          - macos-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
    - name: Run tests
      run: python tests.py
      working-directory: python

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - uses: psf/black@stable
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
      working-directory: python
    - name: Lint with ruff
      run: |
        ruff check
      working-directory: python

    - name: Lint with pylint
      run: |
        pylint cddlparser
      working-directory: python

    - name: Lint with mypy
      run: |
        mypy
      working-directory: python
