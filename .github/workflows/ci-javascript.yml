name: CI for Javascript code

on:
  push:
    paths:
      - 'typescript/**'
      - '!typescript/LICENSE'
      - '!typescript/MANIFEST.in'
      - '!typescript/README.md'
  pull_request:
  workflow_dispatch: {}

jobs:
  build:
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 24
    - name: Install dependencies
      run: npm ci
      working-directory: typescript
    - name: Run tests
      run:  npm test
      working-directory: typescript
